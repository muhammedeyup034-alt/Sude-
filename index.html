<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sude ❤️</title>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#0f0f0f,#1b1b1b);
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:70px;
    font-size:50px;
    color:#ff4d6d;
}

p{
    font-size:20px;
    width:85%;
    margin:auto;
    line-height:35px;
}

.card{
    background:#222;
    width:90%;
    max-width:600px;
    margin:40px auto;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 20px rgba(255,0,80,.4);
}

button{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:15px 35px;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
}

button:hover{
    background:#ff6f91;
}
</style>

</head>

<body>

<h1>❤️ SUDE ❤️</h1>

<p>
Bazı insanlar hayatımıza gelir ve her şeyi değiştirir...
Bu sayfadaki her kelime ve her şarkı sadece senin için.
</p>

<div class="card">
<h2>💌 Sana Bir Not</h2>

<p>
Belki bütün hislerimi kelimeler anlatamaz.
Ama umarım bu sayfa, sana ne kadar değer verdiğimi hissettirir.
❤️
</p>

<button onclick="alert('Seni gülümsetebildiysem ne mutlu bana. ❤️')">
Bana Tıkla
</button>

</div>

</body>
</html>
