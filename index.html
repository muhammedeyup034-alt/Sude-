<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sudemeee bebegimmee ❤️</title>

<style>
body{
margin:0;
background:linear-gradient(#080014,#240033);
color:white;
font-family:Arial,sans-serif;
text-align:center;
overflow-x:hidden;
}

h1{
font-size:55px;
margin-top:50px;
color:#ff6b9d;
text-shadow:0 0 20px #ff6b9d;
}

.box{
width:85%;
max-width:500px;
margin:25px auto;
padding:25px;
background:rgba(255,255,255,0.1);
border-radius:25px;
box-shadow:0 0 25px #ff4d88;
}

button{
background:#ff4d88;
color:white;
border:0;
padding:14px 30px;
border-radius:30px;
font-size:18px;
}

.ic{
display:none;
margin-top:20px;
}

img{
width:90%;
border-radius:20px;
margin:10px;
}

.heart{
position:fixed;
bottom:-20px;
font-size:25px;
animation:kalp 8s linear infinite;
}

@keyframes kalp{
from{transform:translateY(0);}
to{transform:translateY(-110vh);}
}

.star{
position:fixed;
animation:yildiz 3s infinite;
}

@keyframes yildiz{
50%{opacity:0.3;}
}

</style>

</head>

<body>

<h1>❤️ BEBEGİMMM❤️</h1>

<p>
Sadece senin için hazırlandı ✨
</p>


<div class="box">

<h2>💌 Sözler</h2>

<button onclick="ac('soz')">
Aç
</button>

<div id="soz" class="ic">

<p>
Bazı insanlar hayatımıza girer ve her şeyi güzelleştirir.
Sen de benim için çok özelsin ❤️🤍
</p>

</div>

</div>



<div class="box">

<h2>🎵 Müzik</h2>

<button onclick="ac('muzik')">
Aç
</button>

<div id="muzik" class="ic">

<p>
Sude'nin şarkıları 🎧
</p>

<a href="https://open.spotify.com/playlist/3mfRoxPlQuxR2zzQYI03VC?si=cTXQXe42Q5OdlbSesMP_zQ&utm_source=copy-link&pi=Asvjhg2yTjeaa" target="_blank">

<button>
🎶 Birlikte Dinleyelim ❤️
  Bas Aşkımmm
</button>

</a>

</div>

</div>



<div class="box">

<h2>📸 Fotoğraflar</h2>

<button onclick="ac('foto')">
Aç
</button>

<div id="foto" class="ic">

<p>
Fotoğraflar burada olacak ❤️
</p>

<p>Bizden güzel anılar ❤️</p>

<img src="1783236982737.png">
<img src="1783237527200.png">
<img src="IMG_20260705_103059.jpg">
<img src="IMG_20260705_103719.jpg">
<img src="file_00000000ba3071f48af895807e23fbd7.png">

</div>

</div>



<script>

function ac(id){

let bolumler=document.querySelectorAll(".ic");

bolumler.forEach(function(x){
x.style.display="none";
});

document.getElementById(id).style.display="block";

}


for(let i=0;i<25;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.animationDelay=Math.random()*8+"s";
document.body.appendChild(h);


let s=document.createElement("div");
s.className="star";
s.innerHTML="✨";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
document.body.appendChild(s);

}

</script>


</body>
</html>
